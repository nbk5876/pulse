{% extends "base.html" %}
{% block title %}Log In · Pulse{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <h1 class="form-title">Log In</h1>
    <form method="POST" action="/login" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" name="email" class="form-input"
               value="{{ form.get('email', '') }}" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-input"
               autocomplete="current-password" required>
      </div>

      <input type="hidden" name="next" value="{{ next or request.args.get('next', '') }}">

      <div class="form-group form-remember">
        <label class="remember-label">
          <input type="checkbox" name="remember" value="1"> Keep me logged in
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Log In</button>
    </form>

    <p class="form-footer-link">
      Don't have an account? <a href="/register">Register</a>
    </p>
  </div>
</div>
{% endblock %}
